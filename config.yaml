llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.2
  max_tokens: 8192
  # Cheaper/faster model for classification and SQL correction
  classification_model: "gemini-2.5-flash-lite"
  correction_model: "gemini-2.5-flash-lite"
  # Embedding model for Golden Bucket similarity search
  embedding_model: "models/text-embedding-004"
  # Max output tokens for report generation (controls verbosity and token cost)
  report_max_output_tokens: 1024

bigquery:
  project_id: null
  dataset_id: "bigquery-public-data.thelook_ecommerce"

memory:
  golden_bucket_path: "data/golden_trios.sqlite"
  user_prefs_path: "data/user_prefs.sqlite"
  reports_path: "data/saved_reports.sqlite"
  candidate_trios_path: "data/candidate_trios.jsonl"

safety:
  # Exact phrase the operator must type to confirm destructive operations
  confirm_phrase: "YES DELETE"
  # Default user ID when none is specified
  default_user_id: "manager_a"
  # PII column names that are always dropped from query results
  pii_columns:
    - email
    - phone
    - phone_number
    - mobile
    - address

agent:
  # Max rows of BigQuery results passed to the report LLM (reduce to save tokens)
  report_max_rows: 20
  # Number of recent conversation turns kept verbatim in the SQL prompt
  context_verbatim_turns: 2
  # Older turns beyond context_verbatim_turns are summarised into one sentence
  context_summary_enabled: true
  # Golden Bucket cache: TTL in seconds (0 = disabled), max cached entries
  golden_bucket_cache_ttl_s: 300
  golden_bucket_cache_size: 50

resilience:
  llm_max_attempts: 5
  llm_min_wait_s: 5
  llm_max_wait_s: 60
  bq_max_attempts: 3
  bq_min_wait_s: 2
  bq_max_wait_s: 15
  sql_max_retries: 3
